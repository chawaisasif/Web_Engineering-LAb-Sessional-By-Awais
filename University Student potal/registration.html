<!DOCTYPE html>
<html>
<head>
    <title>Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="script.js"></script>
</head>
<body>

<div class="container mt-5">
    <h2>Student Registration</h2>

    <form onsubmit="return validateForm()">
        <input type="text" id="name" class="form-control mb-2" placeholder="Name">
        <input type="email" id="email" class="form-control mb-2" placeholder="Email">
        <input type="password" id="password" class="form-control mb-2" placeholder="Password">
        <input type="password" id="confirmPassword" class="form-control mb-2" placeholder="Confirm Password">
        <input type="text" id="age" class="form-control mb-2" placeholder="Age">

        <select id="gender" class="form-control mb-3">
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        <button class="btn btn-primary">Register</button>
    </form>
</div>

</body>
</html>
