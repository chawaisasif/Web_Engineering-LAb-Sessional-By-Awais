<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="script.js"></script>
</head>
<body>

<div class="container mt-5">
    <h2>Feedback</h2>

    <form onsubmit="return feedbackValidation()">
        <input type="text" id="fname" class="form-control mb-2" placeholder="Name">
        <textarea id="comment" class="form-control mb-2" placeholder="Comments"></textarea>

        <select id="rating" class="form-control mb-3">
            <option value="">Rating</option>
            <option>Excellent</option>
            <option>Good</option>
            <option>Average</option>
        </select>

        <button class="btn btn-success">Submit</button>
    </form>

    <br>
    <a href="dashboard.html">Back to Dashboard</a>
</div>

</body>
</html>
